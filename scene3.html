<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

*{ margin:0; padding:0; box-sizing:border-box; }

body{
background:#0c0c14;
color:#eeeeff;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Space Mono',monospace;
overflow:hidden;
}

#text{
font-size:44px;
margin-bottom:64px;
border-right:3px solid rgba(255,255,255,0.8);
padding-right:10px;
white-space:nowrap;
animation:cursorBlink 1s step-end infinite;
min-height:1.2em;
}

@keyframes cursorBlink{
0%,100%{ border-color:rgba(255,255,255,0.8); }
50%{ border-color:transparent; }
}

.done{ border-color:transparent !important; animation:none !important; }

.stage{
position:relative;
width:900px;
height:320px;
}

.character{
position:absolute;
transition:all 1.1s cubic-bezier(0.22,1,0.36,1);
filter:drop-shadow(0 0 6px rgba(255,255,255,0.2));
}

#boy{
left:-200px;
top:80px;
}

#girl{
right:-200px;
top:80px;
}

.facepalm{
transform:rotate(-28deg) translateY(14px) !important;
}

.notice{
transform:scale(1.08);
}

/* cringe badge */

#meme{
position:absolute;
left:50%;
top:30px;
transform:translateX(-50%) scale(0);
transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
filter:drop-shadow(0 0 18px rgba(255,60,60,0.7));
}

#pause{
font-size:56px;
letter-spacing:10px;
opacity:0;
margin-top:24px;
transition:opacity 0.6s ease;
color:rgba(255,255,255,0.5);
}

</style>
</head>

<body>

<div id="text"></div>

<div class="stage">

<!-- cringe badge -->
<svg id="meme" width="190" height="100">
<rect x="5" y="5" width="180" height="90" rx="12"
stroke="#ff4444" stroke-width="2.5" fill="rgba(255,40,40,0.08)"/>
<text x="95" y="42" text-anchor="middle" fill="#ff6666"
font-family="Space Mono,monospace" font-size="18" font-weight="700"
letter-spacing="3">CRINGE</text>
<text x="95" y="70" text-anchor="middle" fill="#ff6666"
font-family="Space Mono,monospace" font-size="15" letter-spacing="5">ALERT</text>
</svg>

<!-- boy -->
<svg id="boy" class="character" width="120" height="160">
<circle cx="60" cy="30" r="13" stroke="white" stroke-width="3" fill="none"/>
<line x1="60" y1="43" x2="60" y2="96" stroke="white" stroke-width="3"/>
<line x1="60" y1="62" x2="40" y2="78" stroke="white" stroke-width="3"/>
<line x1="60" y1="62" x2="80" y2="78" stroke="white" stroke-width="3"/>
<line x1="60" y1="96" x2="44" y2="132" stroke="white" stroke-width="3"/>
<line x1="60" y1="96" x2="76" y2="132" stroke="white" stroke-width="3"/>
</svg>

<!-- girl -->
<svg id="girl" class="character" width="140" height="160">
<circle cx="60" cy="30" r="13" stroke="white" stroke-width="3" fill="none"/>
<path d="M73 30 Q85 20 97 28 Q109 36 121 28"
stroke="white" stroke-width="2.5" fill="none"/>
<line x1="60" y1="43" x2="60" y2="96" stroke="white" stroke-width="3"/>
<line x1="60" y1="62" x2="40" y2="78" stroke="white" stroke-width="3"/>
<line x1="60" y1="62" x2="80" y2="78" stroke="white" stroke-width="3"/>
<line x1="60" y1="96" x2="44" y2="132" stroke="white" stroke-width="3"/>
<line x1="60" y1="96" x2="76" y2="132" stroke="white" stroke-width="3"/>
</svg>

</div>

<div id="pause">. . .</div>

<script>

const sentence = "Cheezein cringe lagne lagenge"
const textEl   = document.getElementById("text")
let i = 0

function typeText(){
if(i < sentence.length){
textEl.textContent += sentence.charAt(i)
i++
setTimeout(typeText, 68)
}else{
textEl.classList.add("done")
setTimeout(enterCharacters, 500)
}
}
typeText()

function enterCharacters(){
document.getElementById("boy").style.left  = "270px"
document.getElementById("girl").style.right = "270px"
setTimeout(noticeMoment, 1700)
}

function noticeMoment(){
document.getElementById("boy").classList.add("notice")
document.getElementById("girl").classList.add("notice")
setTimeout(showMeme, 420)
}

function showMeme(){
document.getElementById("meme").style.transform = "translateX(-50%) scale(1)"
setTimeout(facepalm, 950)
}

function facepalm(){
const boy  = document.getElementById("boy")
const girl = document.getElementById("girl")
boy.classList.remove("notice")
girl.classList.remove("notice")
boy.style.transition  = "all 0.5s cubic-bezier(0.6,-0.28,0.74,0.05)"
girl.style.transition = "all 0.5s cubic-bezier(0.6,-0.28,0.74,0.05)"
boy.classList.add("facepalm")
girl.classList.add("facepalm")
setTimeout(() => {
document.getElementById("pause").style.opacity = 1
}, 600)
}

</script>
</body>
</html>
