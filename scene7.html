<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

*{ margin:0; padding:0; box-sizing:border-box; }

body{
background:#0c0c14;
color:#eeeeff;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Space Mono',monospace;
overflow:hidden;
}

#text{
font-size:48px;
margin-bottom:72px;
min-height:1.2em;
letter-spacing:1px;
}

.stage{
position:relative;
width:900px;
height:320px;
}

.character{
position:absolute;
transition:all 1.1s cubic-bezier(0.55,0,1,0.45);
filter:drop-shadow(0 0 5px rgba(255,255,255,0.2));
}

#boy{ left:240px; top:110px; }
#girl{ right:240px; top:110px; }

.fallLeft{ transform:rotate(-92deg) translateY(30px); }
.fallRight{ transform:rotate(92deg) translateY(30px); }

.ghost{
position:absolute;
opacity:0;
transition:all 1.2s ease;
filter:drop-shadow(0 0 16px rgba(150,255,220,0.6));
}

/* line 2 appears with weight */
#line2{
opacity:0;
transition:opacity 0.6s ease;
color:#cc8888;
}

</style>
</head>

<body>

<div id="text">
<span id="line1"></span><span id="line2"> mar jayenge</span>
</div>

<div class="stage">

<!-- BOY -->
<svg id="boy" class="character" width="140" height="200">
<circle cx="70" cy="40" r="13" stroke="white" stroke-width="3" fill="none"/>
<line x1="70" y1="53" x2="70" y2="112" stroke="white" stroke-width="3"/>
<line x1="70" y1="72" x2="50" y2="97" stroke="white" stroke-width="3"/>
<line x1="70" y1="72" x2="90" y2="97" stroke="white" stroke-width="3"/>
<line x1="70" y1="112" x2="54" y2="152" stroke="white" stroke-width="3"/>
<line x1="70" y1="112" x2="86" y2="152" stroke="white" stroke-width="3"/>
</svg>

<!-- GIRL -->
<svg id="girl" class="character" width="140" height="200">
<circle cx="70" cy="40" r="13" stroke="white" stroke-width="3" fill="none"/>
<path d="M83 40 Q95 30 107 38 Q119 46 131 38" stroke="white" stroke-width="2.5" fill="none"/>
<line x1="70" y1="53" x2="70" y2="112" stroke="white" stroke-width="3"/>
<line x1="70" y1="72" x2="50" y2="97" stroke="white" stroke-width="3"/>
<line x1="70" y1="72" x2="90" y2="97" stroke="white" stroke-width="3"/>
<line x1="70" y1="112" x2="54" y2="152" stroke="white" stroke-width="3"/>
<line x1="70" y1="112" x2="86" y2="152" stroke="white" stroke-width="3"/>
</svg>

<!-- ghost boy -->
<svg id="ghostBoy" class="ghost" width="70" height="80"
style="left:270px; top:90px;">
<circle cx="35" cy="22" r="13" stroke="rgba(150,255,220,0.9)" stroke-width="2.5" fill="none"/>
<path d="M22 35 Q35 52 48 35" stroke="rgba(150,255,220,0.9)" stroke-width="2.5" fill="none"/>
<path d="M22 35 L22 65 Q28 58 35 65 Q42 58 48 65 L48 35" stroke="rgba(150,255,220,0.7)" stroke-width="2" fill="rgba(150,255,220,0.04)"/>
</svg>

<!-- ghost girl -->
<svg id="ghostGirl" class="ghost" width="70" height="80"
style="right:270px; top:90px;">
<circle cx="35" cy="22" r="13" stroke="rgba(150,255,220,0.9)" stroke-width="2.5" fill="none"/>
<path d="M22 35 Q35 52 48 35" stroke="rgba(150,255,220,0.9)" stroke-width="2.5" fill="none"/>
<path d="M22 35 L22 65 Q28 58 35 65 Q42 58 48 65 L48 35" stroke="rgba(150,255,220,0.7)" stroke-width="2" fill="rgba(150,255,220,0.04)"/>
</svg>

</div>

<script>

const sentence1 = "Aur phir..."
const line1El   = document.getElementById("line1")
const line2El   = document.getElementById("line2")

let i = 0
function type1(){
if(i < sentence1.length){
line1El.textContent += sentence1.charAt(i)
i++
setTimeout(type1, 80)
}else{
setTimeout(() => {
line2El.style.opacity = 1
setTimeout(deathScene, 800)
}, 600)
}
}
type1()

function deathScene(){

setTimeout(()=>{
document.getElementById("boy").classList.add("fallLeft")
document.getElementById("girl").classList.add("fallRight")
}, 0)

setTimeout(()=>{
const ghostBoy  = document.getElementById("ghostBoy")
const ghostGirl = document.getElementById("ghostGirl")
ghostBoy.style.opacity  = 1
ghostGirl.style.opacity = 1
ghostBoy.style.transform  = "translateY(-100px)"
ghostGirl.style.transform = "translateY(-100px)"

/* subtle shimmer */
let phase = 0
setInterval(()=>{
phase += 0.1
ghostBoy.style.opacity  = 0.7 + 0.3 * Math.sin(phase)
ghostGirl.style.opacity = 0.7 + 0.3 * Math.sin(phase + 1)
}, 80)

}, 1400)

}

</script>
</body>
</html>
