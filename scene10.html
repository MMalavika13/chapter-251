<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

*{ margin:0; padding:0; box-sizing:border-box; }

body{
background:#0c0c14;
color:#eeeeff;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Space Mono',monospace;
overflow:hidden;
}

#text{
font-size:48px;
opacity:0;
transition:opacity 2s ease;
margin-bottom:48px;
letter-spacing:2px;
color:rgba(220,210,255,0.9);
}

.stage{
position:relative;
width:900px;
height:380px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:36px;
}

#clock{
opacity:0;
transition:opacity 1s ease;
filter:drop-shadow(0 0 20px rgba(180,160,255,0.35));
}

.hand{
transform-origin:65px 65px;
}

#calendar{
opacity:0;
transition:opacity 1s ease;
text-align:center;
}

#weekday{
font-size:30px;
letter-spacing:6px;
color:rgba(200,190,255,0.9);
height:36px;
}

#month{
font-size:22px;
letter-spacing:4px;
color:rgba(180,170,220,0.6);
margin-top:8px;
height:28px;
}

</style>
</head>

<body>

<div id="text">But guess what…</div>

<div class="stage">

<!-- CLOCK with tick marks -->
<svg id="clock" width="130" height="130">
<!-- face -->
<circle cx="65" cy="65" r="58" stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none"/>
<!-- tick marks -->
<line x1="65" y1="10" x2="65" y2="20" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" transform="rotate(0,65,65)"/>
<line x1="65" y1="10" x2="65" y2="17" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" transform="rotate(30,65,65)"/>
<line x1="65" y1="10" x2="65" y2="17" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" transform="rotate(60,65,65)"/>
<line x1="65" y1="10" x2="65" y2="20" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" transform="rotate(90,65,65)"/>
<line x1="65" y1="10" x2="65" y2="17" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" transform="rotate(120,65,65)"/>
<line x1="65" y1="10" x2="65" y2="17" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" transform="rotate(150,65,65)"/>
<line x1="65" y1="10" x2="65" y2="20" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" transform="rotate(180,65,65)"/>
<line x1="65" y1="10" x2="65" y2="17" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" transform="rotate(210,65,65)"/>
<line x1="65" y1="10" x2="65" y2="17" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" transform="rotate(240,65,65)"/>
<line x1="65" y1="10" x2="65" y2="20" stroke="rgba(255,255,255,0.8)" stroke-width="2.5" transform="rotate(270,65,65)"/>
<line x1="65" y1="10" x2="65" y2="17" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" transform="rotate(300,65,65)"/>
<line x1="65" y1="10" x2="65" y2="17" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" transform="rotate(330,65,65)"/>
<!-- hour hand -->
<line id="hour" class="hand" x1="65" y1="65" x2="65" y2="36" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
<!-- minute hand -->
<line id="minute" class="hand" x1="65" y1="65" x2="65" y2="18" stroke="rgba(255,255,255,0.75)" stroke-width="3" stroke-linecap="round"/>
<!-- second hand -->
<line id="second" class="hand" x1="65" y1="70" x2="65" y2="14" stroke="rgba(200,180,255,0.8)" stroke-width="1.5" stroke-linecap="round"/>
<!-- center dot -->
<circle cx="65" cy="65" r="4" fill="white"/>
</svg>

<!-- CALENDAR -->
<div id="calendar">
<div id="weekday"></div>
<div id="month"></div>
</div>

</div>

<script>

setTimeout(()=> document.getElementById("text").style.opacity = 1, 900)
setTimeout(()=> document.getElementById("clock").style.opacity = 1, 2000)
setTimeout(()=> document.getElementById("calendar").style.opacity = 1, 2800)

let h = 0, m = 0, s = 0

setInterval(()=>{
m += 14
h += 1.2
s += 90
document.getElementById("minute").style.transform = "rotate("+m+"deg)"
document.getElementById("hour").style.transform   = "rotate("+h+"deg)"
document.getElementById("second").style.transform = "rotate("+s+"deg)"
}, 90)

const days = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]
let d = 0
setInterval(()=>{
document.getElementById("weekday").textContent = days[d]
d = (d + 1) % days.length
}, 480)

const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]
let mo = 0
setInterval(()=>{
document.getElementById("month").textContent = months[mo]
mo = (mo + 1) % months.length
}, 860)

</script>
</body>
</html>
