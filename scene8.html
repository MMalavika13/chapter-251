<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>

*{ margin:0; padding:0; box-sizing:border-box; }

body{
background:#0c0c14;
color:#eeeeff;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:'Space Mono',monospace;
overflow:hidden;
gap:28px;
}

.line{
font-size:40px;
opacity:0;
transform:translateY(16px);
transition:opacity 1.4s ease, transform 1.4s cubic-bezier(0.22,1,0.36,1);
text-align:center;
letter-spacing:1px;
}

.line.show{
opacity:1;
transform:translateY(0);
}

#line1{ color:rgba(220,210,255,0.7); font-size:34px; }
#line2{ font-size:40px; }
#line3{ font-size:46px; font-weight:700; text-shadow:0 0 40px rgba(220,210,255,0.3); }

</style>
</head>

<body>

<div id="line1" class="line">Toh shayad…</div>
<div id="line2" class="line">jo kehna hai</div>
<div id="line3" class="line">abhi keh dena chahiye</div>

<script>

setTimeout(()=> document.getElementById("line1").classList.add("show"), 1200)
setTimeout(()=> document.getElementById("line2").classList.add("show"), 3000)
setTimeout(()=> document.getElementById("line3").classList.add("show"), 5000)

</script>
</body>
</html>
